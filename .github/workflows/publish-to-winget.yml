name: Publish winget-pkgs on release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  create-pr-branch:
    runs-on: windows-latest
    env:
      REPO: ${{ github.repository }}
    steps:
      - name: Configure Git
        shell: pwsh
        run: |
          git config --global user.name ${{ vars.USER_NAME }}
          git config --global user.email ${{ vars.USER_EMAIL }}

      - name: Clone from GitHub and Create PR
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone --depth 1 https://${{ secrets.PAT_TOKEN }}@github.com/abgox/InputTip.git InputTip
          git clone --depth 1 https://${{ secrets.PAT_TOKEN }}@github.com/abgox/winget-pkgs.git winget-pkgs
          cd winget-pkgs

          $info = ..\InputTip\.github\scripts\create-winget-manifest.ps1

          $new_branch = $info.new_branch
          $commit_msg = $info.commit_msg
          $pr_title   = $info.pr_title
          $pr_body    = $info.pr_body

          git checkout -b $new_branch
          git add .
          git commit -m $commit_msg
          git push -f origin $new_branch

          gh pr create `
            --title "$pr_title" `
            --body "$pr_body" `
            --head "abgox:$new_branch" `
            --base "master" `
            --repo "microsoft/winget-pkgs"
